<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" routerLink="home">
            <i class="fas fa-check-double me-2"></i>TaskMaster Pro
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" routerLink="home">Home</a>
                </li>
                @if (authService.loggedUser()) {
                    <li class="nav-item">
                        <a class="nav-link active" routerLink="dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" routerLink="tasks">Tasks</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" routerLink="goals">Goals</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" routerLink="reminders">Reminders</a>
                    </li>
                }
            </ul>
            
            @if (authService.loggedUser(); as user) {
                <button class="btn btn-outline-light me-2" disabled>
                    <i class="fas fa-user me-2"></i>{{ user.emailId }}
                </button>
                <button class="btn btn-secondary" (click)="logout()">
                    <i class="fas fa-sign-out-alt me-2"></i>Logout
                </button>
            } @else {
                <button class="btn btn-outline-light" (click)="openModal()">
                    <i class="fas fa-user me-2"></i>Login
                </button>
            }
        </div>
    </div>
</nav>

<app-login-modal [visible]="modalVisible" (close)="closeModal()"></app-login-modal>
